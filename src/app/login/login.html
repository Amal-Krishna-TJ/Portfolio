<div class="container mt-5" style="max-width: 400px;">
  <h3 class="mb-4">Login Portal</h3>
  <form (ngSubmit)="login()">
    <div class="mb-3">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" name="username" minlength="3" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" minlength="8" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>
</div>
